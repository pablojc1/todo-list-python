<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --card: #1c1c1c;
      --border: #2a2a2a;
      --accent: #c8f04d;
      --accent-dim: #a8cc3a;
      --text: #f0f0f0;
      --muted: #777;
      --done-text: #444;
      --danger: #ff5b5b;
      --radius: 16px;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1rem 6rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    header {
      margin-bottom: 2.5rem;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: .5rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
    }

    h1 span {
      color: var(--accent);
    }

    .date {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      padding-top: 6px;
      line-height: 1.6;
    }

    .stats {
      display: flex;
      gap: 1.5rem;
      margin-top: 1.25rem;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-value.accent { color: var(--accent); }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 1.25rem;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }

    /* Input */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    button.add-btn {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: 12px;
      width: 52px;
      height: 52px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }

    button.add-btn:hover { background: var(--accent-dim); }
    button.add-btn:active { transform: scale(.95); }

    /* Filters */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e0e;
      font-weight: 500;
    }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color .2s, opacity .2s;
      animation: slideIn .25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { border-color: #3a3a3a; }

    .task-item.done {
      opacity: .5;
    }

    /* Custom checkbox */
    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
      font-size: 13px;
    }

    .check-btn:hover { border-color: var(--accent); }

    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #0e0e0e;
    }

    .task-text {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.4;
      word-break: break-word;
      transition: all .2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    /* Edit input inline */
    .task-edit {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--accent);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      outline: none;
      padding: 2px 0;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .15s;
    }

    .task-item:hover .task-actions { opacity: 1; }

    .action-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background .15s;
      color: var(--muted);
    }

    .action-btn:hover { background: var(--border); color: var(--text); }
    .action-btn.del:hover { background: rgba(255,91,91,.15); color: var(--danger); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 3rem 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      display: none;
    }

    .empty.show { display: block; }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: .75rem;
      display: block;
    }

    /* Footer tag */
    .footer-tag {
      margin-top: 3rem;
      font-family: var(--mono);
      font-size: 11px;
      color: #333;
      text-align: center;
      letter-spacing: .08em;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <h1>fazer<span>.</span></h1>
      <div class="date" id="date-display"></div>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="total-count">0</span>
        <span class="stat-label">total</span>
      </div>
      <div class="stat">
        <span class="stat-value accent" id="done-count">0</span>
        <span class="stat-label">concluídas</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="pending-count">0</span>
        <span class="stat-label">pendentes</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </header>

  <div class="input-row">
    <div class="input-wrap">
      <input type="text" id="task-input" placeholder="Nova tarefa..." maxlength="120" />
    </div>
    <button class="add-btn" onclick="addTask()" title="Adicionar">+</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pendentes</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Concluídas</button>
  </div>

  <div class="task-list" id="task-list"></div>
  <div class="empty" id="empty-state">
    <span class="empty-icon">✦</span>
    Nenhuma tarefa aqui.
  </div>

  <div class="footer-tag">FEITO COM PYTHON + HTML · PABLO GOMES</div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';

  // Data
  const d = new Date();
  document.getElementById('date-display').innerHTML =
    d.toLocaleDateString('pt-BR', {weekday:'long'}).toUpperCase() + '<br>' +
    d.toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});

  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function updateStats() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pending = total - done;
    document.getElementById('total-count').textContent = total;
    document.getElementById('done-count').textContent = done;
    document.getElementById('pending-count').textContent = pending;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function render() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';

    const visible = tasks.filter(t => {
      if (filter === 'pending') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });

    empty.classList.toggle('show', visible.length === 0);

    visible.forEach(t => {
      const idx = tasks.indexOf(t);
      const item = document.createElement('div');
      item.className = 'task-item' + (t.done ? ' done' : '');

      item.innerHTML = `
        <button class="check-btn" onclick="toggle(${idx})" title="${t.done ? 'Reabrir' : 'Concluir'}">
          ${t.done ? '✓' : ''}
        </button>
        <span class="task-text" ondblclick="startEdit(${idx}, this)">${escHtml(t.text)}</span>
        <div class="task-actions">
          <button class="action-btn" onclick="startEditById(${idx})" title="Editar">✎</button>
          <button class="action-btn del" onclick="remove(${idx})" title="Deletar">✕</button>
        </div>
      `;
      list.appendChild(item);
    });

    updateStats();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) return;
    tasks.unshift({ text, done: false, id: Date.now() });
    input.value = '';
    save();
    render();
  }

  function toggle(idx) {
    tasks[idx].done = !tasks[idx].done;
    save();
    render();
  }

  function remove(idx) {
    tasks.splice(idx, 1);
    save();
    render();
  }

  function startEditById(idx) {
    const items = document.querySelectorAll('.task-item');
    const visibleTasks = tasks.filter(t => {
      if (filter === 'pending') return !t.done;
      if (filter === 'done') return t.done;
      return true;
    });
    const pos = visibleTasks.indexOf(tasks[idx]);
    if (pos === -1) return;
    const span = items[pos].querySelector('.task-text');
    startEdit(idx, span);
  }

  function startEdit(idx, span) {
    const current = tasks[idx].text;
    const editInput = document.createElement('input');
    editInput.className = 'task-edit';
    editInput.value = current;
    span.replaceWith(editInput);
    editInput.focus();
    editInput.select();

    function commit() {
      const val = editInput.value.trim();
      if (val) tasks[idx].text = val;
      save();
      render();
    }

    editInput.addEventListener('blur', commit);
    editInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') commit();
      if (e.key === 'Escape') render();
    });
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
